<svg xmlns="http://www.w3.org/2000/svg" width="129" height="121" viewBox="0 0 129 121" fill="none">
  <defs>
    <!-- Soft glow blur -->
    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6"></feGaussianBlur>
    </filter>

    <!-- Inner glow blur (sharper core) -->
    <filter id="innerBlur" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.5"></feGaussianBlur>
    </filter>

    <!-- Main gradient: warm orange center to pink glow to transparent -->
    <radialGradient id="sparkGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#F89265" stop-opacity="1"></stop>
      <stop offset="28%" stop-color="#F7A07A" stop-opacity="0.95"></stop>
      <stop offset="55%" stop-color="#F6B1A6" stop-opacity="0.65"></stop>
      <stop offset="78%" stop-color="#F3A6C8" stop-opacity="0.35"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </radialGradient>

    <!-- Core gradient: tighter and brighter -->
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#F89265" stop-opacity="1"></stop>
      <stop offset="55%" stop-color="#F6A37D" stop-opacity="0.65"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  <!-- Outer glow cross -->
  <g filter="url(#softBlur)" opacity="0.95">
    <!-- vertical -->
    <rect x="54.5" y="8" width="20" height="105" rx="10" fill="url(#sparkGrad)"></rect>
    <!-- horizontal -->
    <rect x="10" y="50.5" width="109" height="20" rx="10" fill="url(#sparkGrad)"></rect>
  </g>

  <!-- Inner core cross -->
  <g filter="url(#innerBlur)" opacity="0.95">
    <rect x="57.5" y="18" width="14" height="85" rx="7" fill="url(#coreGrad)"></rect>
    <rect x="20" y="53.5" width="89" height="14" rx="7" fill="url(#coreGrad)"></rect>
  </g>
</svg>